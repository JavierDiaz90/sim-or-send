[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/leaderboard"
  to = "/.netlify/functions/leaderboard"
  status = 200

[[redirects]]
  from = "/api/entries"
  to = "/.netlify/functions/entries"
  status = 200

[[redirects]]
  from = "/api/reset"
  to = "/.netlify/functions/reset"
  status = 200
